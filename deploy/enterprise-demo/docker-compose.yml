# Sprint 318a — docker-compose for the §7 enterprise +
# federated inference demo runnable.
#
# One service: a single PRSM enterprise demo node. The
# demo (prsm/enterprise/demo.py) runs entirely in-process
# with filesystem persistence, so no DB / cache / IPFS
# sidecars needed. Operators wanting a multi-node fleet
# extend this compose file with additional replicas.
#
# Usage:
#   # One-shot demo (build + run + exit; rc=0 on success):
#   docker compose -f deploy/enterprise-demo/docker-compose.yml \
#       run --rm prsm-enterprise-demo
#
#   # Long-running (image keeps the persistence volume warm):
#   docker compose -f deploy/enterprise-demo/docker-compose.yml \
#       up -d

services:
  prsm-enterprise-demo:
    build:
      # Build context is the repo root so the Dockerfile
      # can COPY prsm/{compute,enterprise}.
      context: ../..
      dockerfile: deploy/enterprise-demo/Dockerfile
    image: prsm-enterprise-demo:latest
    container_name: prsm-enterprise-demo
    restart: "no"  # demo is one-shot

    volumes:
      # Persistence for FL + pipeline orchestrator state.
      # Operator overrides via PRSM_DEMO_DATA_DIR env on
      # the host.
      - "${PRSM_DEMO_DATA_DIR:-./prsm-demo-data}:/var/lib/prsm"

    environment:
      # The demo doesn't read these (it generates fresh
      # keypairs in-process), but a real deploy would
      # plumb them in from the `.env` file generated by
      # `prsm-enterprise-bringup generate`. Leaving the
      # references here so operators see the wire format.
      PRSM_FEDERATED_LEARNING_DIR: /var/lib/prsm/fl
      PRSM_PIPELINE_ORCHESTRATOR_DIR: /var/lib/prsm/pipeline
      PRSM_CORP_CAPABILITY_DIR: /var/lib/prsm/corp

    # No ports exposed by default — the demo is in-process.
    # Operators serving a real FastAPI surface uncomment +
    # add their port mapping here.
    # ports:
    #   - "8000:8000"
