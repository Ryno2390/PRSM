# PRSM Changelog Generation
# Automatically generate and update changelog on release

name: Generate Changelog

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to generate changelog for (e.g., 0.1.0)'
        required: false
        type: string
      commit:
        description: 'Commit changes to repository'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    name: Generate Changelog
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            # Get latest tag
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.1.0")
            VERSION="${VERSION#v}"
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "✅ Version: $VERSION"
      
      - name: Install git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          version: 'latest'
          config: 'pyproject.toml'
      
      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Generate changelog for the latest release
          git-cliff --tag "v$VERSION" --strip header -o CHANGELOG_NEW.md
          
          # If CHANGELOG.md exists, prepend new content
          if [ -f CHANGELOG.md ]; then
            # Extract header from existing CHANGELOG.md
            head -n 5 CHANGELOG.md > CHANGELOG_HEADER.md
            
            # Combine: header + new content + old content (without header)
            cat CHANGELOG_HEADER.md CHANGELOG_NEW.md > CHANGELOG_COMBINED.md
            tail -n +6 CHANGELOG.md >> CHANGELOG_COMBINED.md
            
            mv CHANGELOG_COMBINED.md CHANGELOG.md
            rm -f CHANGELOG_HEADER.md CHANGELOG_NEW.md
          else
            # Create new CHANGELOG.md with header
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "All notable changes to this project will be documented in this file." >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            cat CHANGELOG_NEW.md >> CHANGELOG.md
            rm -f CHANGELOG_NEW.md
          fi
          
          echo "✅ Changelog generated for version $VERSION"
      
      - name: Generate release notes
        id: release-notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Generate release notes for just this version
          git-cliff --tag "v$VERSION" --strip all -o RELEASE_NOTES_NEW.md
          
          # Prepend to RELEASE_NOTES.md
          if [ -f RELEASE_NOTES.md ]; then
            echo "# Release Notes" > RELEASE_NOTES_HEADER.md
            echo "" >> RELEASE_NOTES_HEADER.md
            cat RELEASE_NOTES_NEW.md RELEASE_NOTES.md > RELEASE_NOTES_COMBINED.md
            mv RELEASE_NOTES_COMBINED.md RELEASE_NOTES.md
            rm -f RELEASE_NOTES_HEADER.md RELEASE_NOTES_NEW.md
          else
            echo "# Release Notes" > RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            cat RELEASE_NOTES_NEW.md >> RELEASE_NOTES.md
            rm -f RELEASE_NOTES_NEW.md
          fi
          
          echo "✅ Release notes generated for version $VERSION"
      
      - name: Commit changelog updates
        if: inputs.commit != false
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add CHANGELOG.md RELEASE_NOTES.md
          
          if git diff --staged --quiet; then
            echo "No changelog changes to commit"
          else
            VERSION="${{ steps.version.outputs.version }}"
            git commit -m "docs: update changelog for v$VERSION
            
            📝 Automated changelog generation
            
            Generated by git-cliff"
            
            git push origin HEAD:main
            echo "✅ Changelog committed and pushed"
          fi
      
      - name: Update GitHub Release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Get release body from generated notes
          RELEASE_BODY=$(git-cliff --tag "v$VERSION" --strip all)
          
          # Update the release with the generated notes
          gh release edit "v$VERSION" --notes "$RELEASE_BODY" || true
          
          echo "✅ GitHub release updated with changelog"
      
      - name: Upload changelog artifacts
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: |
            CHANGELOG.md
            RELEASE_NOTES.md
          retention-days: 30
      
      - name: Summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          echo "## 📝 Changelog Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Version: $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Generated Files" >> $GITHUB_STEP_SUMMARY
          echo "- CHANGELOG.md" >> $GITHUB_STEP_SUMMARY
          echo "- RELEASE_NOTES.md" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changelog Preview" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -n 50 CHANGELOG.md >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
