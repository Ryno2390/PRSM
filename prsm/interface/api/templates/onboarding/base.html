<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PRSM Node Setup — {% block title %}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
  <style>
    .progress-step {
      transition: all 0.3s ease;
    }
    .progress-step.active {
      font-weight: bold;
    }
    .progress-step.completed {
      color: #198754;
    }
    .check-ok { color: #198754; }
    .check-warn { color: #ffc107; }
    .check-fail { color: #dc3545; }
    .config-preview {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 1rem;
      font-family: monospace;
      font-size: 0.875rem;
      overflow-x: auto;
    }
  </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <span class="navbar-brand">PRSM Node Setup</span>
    <span class="navbar-text text-muted">Step {{ step }} of 6</span>
  </div>
</nav>

<div class="container pb-5">
  <!-- Progress Bar -->
  <div class="row justify-content-center mb-4">
    <div class="col-lg-8">
      <div class="progress" style="height: 4px;">
        <div class="progress-bar" role="progressbar" style="width: {{ (step / 6 * 100)|round }}%"></div>
      </div>
      <div class="d-flex justify-content-between mt-2 small text-muted">
        <span class="{% if step >= 1 %}text-success{% endif %}">Welcome</span>
        <span class="{% if step >= 2 %}text-success{% endif %}">API Keys</span>
        <span class="{% if step >= 3 %}text-success{% endif %}">Backend</span>
        <span class="{% if step >= 4 %}text-success{% endif %}">Network</span>
        <span class="{% if step >= 5 %}text-success{% endif %}">Identity</span>
        <span class="{% if step >= 6 %}text-success{% endif %}">Launch</span>
      </div>
    </div>
  </div>

  <div class="row justify-content-center">
    <div class="col-lg-8">
      {% block content %}{% endblock %}
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
