name: Security Scans

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Create reports directory
        run: mkdir -p reports
        
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install bandit safety semgrep
          
      - name: Run Bandit (SAST)
        run: |
          echo "Running Bandit static security analysis..."
          bandit -r prsm/ -f json -o reports/bandit-report.json || true
          bandit -r prsm/ -f txt -o reports/bandit-report.txt || true
        
      - name: Run Safety (dependency check)
        run: |
          echo "Running Safety dependency vulnerability scan..."
          safety check --json > reports/safety-report.json || true
          safety check --output reports/safety-report.txt || true
        
      - name: Run Semgrep
        run: |
          echo "Running Semgrep security analysis..."
          semgrep --config=auto --json --output=reports/semgrep-report.json prsm/ || true
        
      - name: Run PRSM security scanner
        run: |
          echo "Running PRSM internal security scanner..."
          python -m prsm.security.scanner --output reports/prsm-security-report.json || true
        
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: reports/
          retention-days: 30
          
      - name: Check for critical vulnerabilities
        run: python scripts/ci/check_security_reports.py --fail-on-critical --reports-dir reports