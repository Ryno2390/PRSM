name: Deploy

# Deployment is a deliberate act — not a side-effect of pushing to main.
# This workflow is **manual-dispatch only**. Mainnet deployment of
# Phase 1.3 contracts (FTNSToken + ProvenanceRegistry + RoyaltyDistributor)
# is additionally hardware-gated pending Foundation multi-sig quorum;
# that flow runs through contracts/scripts/rehearse-deploy.sh locally,
# not through this workflow.
#
# For **testnet** deploys, prefer deploy-testnet.yml.
# For **release publishing** (PyPI / npm / Go module), prefer release.yml.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target environment"
        required: true
        type: choice
        options:
          - staging
          - canary
      confirm:
        description: "Type 'deploy' to confirm"
        required: true
        type: string

concurrency:
  group: deploy-${{ inputs.target }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:

  preflight:
    name: Preflight (confirm-token + CI green)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate confirmation token
        run: |
          if [[ "${{ inputs.confirm }}" != "deploy" ]]; then
            echo "::error::Confirmation token must be literally 'deploy' — got '${{ inputs.confirm }}'"
            exit 1
          fi
          echo "Confirmation token accepted; target=${{ inputs.target }}"

      - uses: actions/checkout@v4

      - name: Verify CI is green on current commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha="${{ github.sha }}"
          status=$(gh api /repos/${{ github.repository }}/commits/$sha/status --jq .state)
          echo "Combined status for $sha: $status"
          if [[ "$status" != "success" ]]; then
            echo "::error::CI must be green before deploy; current status: $status"
            exit 1
          fi

  deploy:
    name: Deploy to ${{ inputs.target }}
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.target }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Build deployable artifact
        run: |
          echo "Placeholder: build artifact for ${{ inputs.target }}"
          # TODO: Once the target-environment deployer (e.g., container
          # image build, kubectl apply, or Safe-wrapped mainnet deploy)
          # is ready, replace this placeholder with the real command.
          # Leaving this as an explicit TODO rather than dead workflow
          # scaffolding so failures surface clearly.
          exit 0

      - name: Post-deploy smoke check
        run: |
          echo "Placeholder: smoke check against ${{ inputs.target }}"
          # TODO: curl a health endpoint or equivalent once deployed
          # environments expose one.
          exit 0
