name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel any in-progress runs for the same branch / PR when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default to a read-only token — specific jobs opt into more if they need it.
permissions:
  contents: read

jobs:

  # ───────────────────────────────────────────────────────────────
  # Python: tests + coverage on a 3.11 / 3.12 matrix
  # ───────────────────────────────────────────────────────────────
  python-tests:
    name: Python ${{ matrix.python-version }} tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Run tests with coverage
        # -m "not e2e" deselects 42 E2E tests that require live P2P
        # infrastructure (libp2p Go library + WebSocket ports + peer-ID
        # multiaddr fixtures). Run locally with `pytest -m e2e` after
        # building libp2p shared library via `make -C libp2p build`.
        # See pytest.ini § markers for the full rationale.
        run: pytest -m "not e2e" --timeout=120 --cov=prsm --cov-report=xml --cov-report=term -q

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  # ───────────────────────────────────────────────────────────────
  # Lint: ruff + mypy — ADVISORY for now.
  #
  # The codebase has ~47k pre-existing ruff findings (mostly formatting-
  # style) plus mypy debt on legacy modules outside the per-module
  # strict tier in pyproject.toml. Running these as hard gates today
  # would block every PR. Running them as advisory surfaces the debt
  # without blocking velocity. Follow-up tasks to ratchet lint/mypy to
  # blocking:
  #   1. Exclude tests/_legacy/ from ruff explicitly in pyproject.toml
  #   2. Run `ruff check --fix` + `ruff format` across prsm/ in a
  #      dedicated "formatting baseline" commit
  #   3. Expand the pyproject.toml mypy per-module strict-tier list as
  #      more modules are cleaned
  #   4. Flip `|| true` to hard-fail below
  # ───────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + mypy) [advisory]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Ruff check (advisory)
        run: ruff check prsm/ || true

      - name: Ruff format check (advisory)
        run: ruff format --check prsm/ || true

      - name: Mypy (per-module strict tiers per pyproject.toml; advisory)
        run: mypy prsm/ || true

  # ───────────────────────────────────────────────────────────────
  # Solidity: hardhat tests for smart contracts
  # ───────────────────────────────────────────────────────────────
  solidity-tests:
    name: Solidity tests (hardhat)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run hardhat tests
        run: npx hardhat test

  # ───────────────────────────────────────────────────────────────
  # Security: fast static + dependency scans (advisory, non-blocking today)
  # ───────────────────────────────────────────────────────────────
  security-scan:
    name: Security scan (bandit + pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install scanners
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      - name: Bandit (static application security testing)
        run: bandit -r prsm/ -ll -x tests/,prsm/tests/ || true
        # Non-blocking for now — bandit surfaces advisory findings.
        # Ratchet to fail-on-findings once the baseline is clean.

      - name: pip-audit (dependency CVE scan)
        run: pip-audit -r requirements.txt --skip-editable || true
        # Non-blocking for now — dependency CVE findings need triage,
        # not auto-block. Move to fail-on-HIGH once reviewed.

  # ───────────────────────────────────────────────────────────────
  # Summary gate: single status for branch protection / PR gating
  # ───────────────────────────────────────────────────────────────
  ci-status:
    name: CI status
    runs-on: ubuntu-latest
    needs: [python-tests, lint, solidity-tests, security-scan]
    if: always()
    steps:
      - name: Check upstream job results
        run: |
          set -e
          tests_result="${{ needs.python-tests.result }}"
          lint_result="${{ needs.lint.result }}"
          sol_result="${{ needs.solidity-tests.result }}"
          sec_result="${{ needs.security-scan.result }}"
          echo "python-tests:   $tests_result   (blocking)"
          echo "lint:           $lint_result   (advisory — does not block CI status)"
          echo "solidity-tests: $sol_result   (blocking)"
          echo "security-scan:  $sec_result   (blocking)"
          # Lint is advisory while the pre-existing ruff/mypy debt is
          # being paid down. Only the three real gates block CI status.
          if [[ "$tests_result" != "success" || "$sol_result" != "success" || "$sec_result" != "success" ]]; then
            echo "::error::A blocking CI job failed; see individual job logs"
            exit 1
          fi
          echo "All blocking CI jobs passed (lint status: $lint_result, advisory)"
