[profile.default]
src = "src"
test = "test"
out = "out"
libs = ["lib"]
remappings = [
    "@openzeppelin/=../node_modules/@openzeppelin/",
    "canonical/=../contracts/",
]
solc = "0.8.22"
optimizer = true
optimizer_runs = 200
via_ir = false
# Allow forge to read parent-dir sources (canonical
# contracts + node_modules).
fs_permissions = [
    { access = "read", path = "../contracts" },
    { access = "read", path = "../node_modules" },
]
allow_paths = ["..", "../contracts", "../node_modules"]

# Halmos config — see contracts/symbolic-proofs/README.md
# for invocation patterns. Halmos consumes the same forge
# build output that `forge build` produces here.
