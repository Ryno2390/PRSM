# PRSM Bootstrap Server Production Docker Compose
# Complete production deployment for P2P network bootstrap infrastructure

version: '3.8'

# ===================================
# Network Configuration
# ===================================
networks:
  prsm-bootstrap-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"

# ===================================
# Volume Configuration
# ===================================
volumes:
  ssl-certs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /etc/ssl/prsm
  postgres-data:
    driver: local
  redis-data:
    driver: local
  peer-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

# ===================================
# Configurations
# ===================================
x-bootstrap-env: &bootstrap-env
  PRSM_ENV: production
  PRSM_LOG_LEVEL: ${PRSM_LOG_LEVEL:-INFO}
  PRSM_DOMAIN: ${PRSM_DOMAIN:-prsm-network.com}
  PRSM_BOOTSTRAP_PORT: 8765
  PRSM_API_PORT: 8000
  PRSM_MAX_PEERS: ${PRSM_MAX_PEERS:-1000}
  PRSM_PEER_TIMEOUT: ${PRSM_PEER_TIMEOUT:-300}
  PRSM_HEARTBEAT_INTERVAL: ${PRSM_HEARTBEAT_INTERVAL:-30}
  PRSM_SSL_ENABLED: ${PRSM_SSL_ENABLED:-true}
  PRSM_SSL_CERT_PATH: /etc/ssl/certs/prsm.crt
  PRSM_SSL_KEY_PATH: /etc/ssl/private/prsm.key
  PRSM_METRICS_ENABLED: "true"
  PRSM_METRICS_PORT: 9090
  PRSM_REGION: ${PRSM_REGION:-us-east-1}
  PRSM_FEDERATION_PEERS: ${PRSM_FEDERATION_PEERS:-}
  PRSM_AUTH_SECRET: ${PRSM_AUTH_SECRET:-}
  # Multi-region bootstrap identification
  BOOTSTRAP_REGION: ${BOOTSTRAP_REGION:-us-east}
  BOOTSTRAP_REGION_LABEL: ${BOOTSTRAP_REGION_LABEL:-US East (Primary)}

x-healthcheck: &bootstrap-healthcheck
  test: ["CMD", "python", "/app/healthcheck.py"]
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

# ===================================
# Service Definitions
# ===================================
services:

  # ===================================
  # Bootstrap Server (Primary)
  # ===================================
  bootstrap:
    build:
      context: ../
      dockerfile: docker/Dockerfile.bootstrap
      target: production
      args:
        BUILD_ENV: production
        PRSM_VERSION: 1.0.0
      cache_from:
        - prsm-bootstrap:latest
    image: prsm-bootstrap:latest
    container_name: prsm-bootstrap
    restart: unless-stopped
    ports:
      - "8765:8765"   # WebSocket P2P
      - "8000:8000"   # HTTP API
      - "9090:9090"   # Prometheus metrics
    environment:
      <<: *bootstrap-env
      PRSM_EXTERNAL_IP: ${PRSM_EXTERNAL_IP:-}
      DATABASE_URL: postgresql://prsm:${POSTGRES_PASSWORD:-prsm_secure_pass}@postgres:5432/prsm
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ssl-certs:/etc/ssl:ro
      - peer-data:/app/data
      - ../config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - prsm-bootstrap-network
    healthcheck:
      <<: *bootstrap-healthcheck
    labels:
      - "prometheus.io/scrape=true"
      - "prometheus.io/port=9090"
      - "prometheus.io/path=/metrics"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ===================================
  # Bootstrap Server (Replica for HA)
  # ===================================
  bootstrap-replica:
    build:
      context: ../
      dockerfile: docker/Dockerfile.bootstrap
      target: production
    image: prsm-bootstrap:latest
    container_name: prsm-bootstrap-replica
    restart: unless-stopped
    ports:
      - "8766:8765"   # WebSocket P2P
      - "8001:8000"   # HTTP API
      - "9091:9090"   # Prometheus metrics
    environment:
      <<: *bootstrap-env
      PRSM_BOOTSTRAP_PORT: 8765
      PRSM_API_PORT: 8000
      DATABASE_URL: postgresql://prsm:${POSTGRES_PASSWORD:-prsm_secure_pass}@postgres:5432/prsm
      REDIS_URL: redis://redis:6379/1
      PRSM_FEDERATION_PEERS: bootstrap:8765
    volumes:
      - ssl-certs:/etc/ssl:ro
      - peer-data:/app/data
      - ../config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      bootstrap:
        condition: service_healthy
    networks:
      - prsm-bootstrap-network
    healthcheck:
      <<: *bootstrap-healthcheck
    profiles:
      - ha
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ===================================
  # PostgreSQL Database
  # ===================================
  postgres:
    image: postgres:15-alpine
    container_name: prsm-bootstrap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: prsm
      POSTGRES_USER: prsm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prsm_secure_pass}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=en_US.UTF-8"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - prsm-bootstrap-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prsm -d prsm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ===================================
  # Redis Cache
  # ===================================
  redis:
    image: redis:7-alpine
    container_name: prsm-bootstrap-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - prsm-bootstrap-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ===================================
  # Prometheus Monitoring
  # ===================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prsm-bootstrap-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus-bootstrap.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - prsm-bootstrap-network
    depends_on:
      - bootstrap
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    profiles:
      - monitoring

  # ===================================
  # Grafana Dashboard
  # ===================================
  grafana:
    image: grafana/grafana:10.2.0
    container_name: prsm-bootstrap-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - prsm-bootstrap-network
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    profiles:
      - monitoring

  # ===================================
  # Nginx Load Balancer (Optional)
  # ===================================
  nginx:
    image: nginx:1.25-alpine
    container_name: prsm-bootstrap-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ssl-certs:/etc/ssl:ro
    networks:
      - prsm-bootstrap-network
    depends_on:
      - bootstrap
    profiles:
      - loadbalancer
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # ===================================
  # Node Exporter (System Metrics)
  # ===================================
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: prsm-bootstrap-node-exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    networks:
      - prsm-bootstrap-network
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M

  # ===================================
  # Alertmanager (Alerting)
  # ===================================
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: prsm-bootstrap-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    networks:
      - prsm-bootstrap-network
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
