# PRSM Bootstrap Server — Local Development
#
# Usage:
#   cd docker
#   docker compose -f docker-compose.bootstrap-local.yml up -d
#   docker compose -f docker-compose.bootstrap-local.yml logs -f
#   docker compose -f docker-compose.bootstrap-local.yml down

services:
  bootstrap:
    build:
      context: ../
      dockerfile: docker/Dockerfile.bootstrap
    container_name: prsm-bootstrap
    restart: unless-stopped
    ports:
      - "8765:8765"   # WebSocket (P2P peer discovery)
      - "8000:8000"   # HTTP API (health + metrics)
    environment:
      PRSM_ENV: development
      PRSM_LOG_LEVEL: DEBUG
      PRSM_BOOTSTRAP_PORT: "8765"
      PRSM_API_PORT: "8000"
      PRSM_SSL_ENABLED: "false"
      PRSM_MAX_PEERS: "100"
