# PRSM 30-Second Quickstart
# Absolute minimal setup for tutorials and testing
# Usage: docker-compose -f docker/docker-compose.quickstart.yml up -d

version: '3.8'

services:
  # ===================================
  # Minimal Redis (Required)
  # ===================================
  redis:
    image: redis:7-alpine
    container_name: prsm-quickstart-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 3s
    networks:
      - prsm-quickstart

# ===================================
# Network
# ===================================
networks:
  prsm-quickstart:
    driver: bridge
    name: prsm-quickstart-network