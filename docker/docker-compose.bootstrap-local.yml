# PRSM Bootstrap Server — Production with SSL
#
# Usage:
#   cd docker
#   docker compose -f docker-compose.bootstrap-local.yml up -d
#   docker compose -f docker-compose.bootstrap-local.yml logs -f
#   docker compose -f docker-compose.bootstrap-local.yml down

services:
  bootstrap:
    build:
      context: ../
      dockerfile: docker/Dockerfile.bootstrap
    container_name: prsm-bootstrap
    restart: unless-stopped
    ports:
      - "8765:8765"   # WebSocket (P2P peer discovery)
      - "8000:8000"   # HTTP API (health + metrics)
    environment:
      PRSM_ENV: production
      PRSM_LOG_LEVEL: INFO
      PRSM_BOOTSTRAP_PORT: "8765"
      PRSM_API_PORT: "8000"
      PRSM_SSL_ENABLED: "true"
      PRSM_SSL_CERT_PATH: "/etc/letsencrypt/live/bootstrap1.prsm-network.com/fullchain.pem"
      PRSM_SSL_KEY_PATH: "/etc/letsencrypt/live/bootstrap1.prsm-network.com/privkey.pem"
      PRSM_MAX_PEERS: "500"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
