name: Solidity Static Analysis (L1)

# Implements AUDIT_PLAN.md L1 — static + symbolic tooling layer.
#
# Two tiers:
#   - Fast tier (per-PR + push): Slither + Aderyn. MUST pass for merge
#     to main. Detects ~80% of common Solidity smell-classes in seconds.
#   - Slow tier (weekly schedule + workflow_dispatch): Mythril + Halmos
#     + Echidna. Symbolic execution + property fuzzing. Soft-fail with
#     SARIF/markdown artifacts uploaded for review.
#
# Halmos + Echidna are no-ops until property-test contracts exist.
# Wiring is what L1 delivers; property authoring is follow-up work.
# See audits/L1-static-tooling/README.md.

on:
  push:
    branches: [main]
    paths:
      - 'contracts/contracts/**'
      - 'contracts/scripts/**'
      - 'contracts/hardhat.config.js'
      - '.github/workflows/solidity-static-analysis.yml'
  pull_request:
    branches: [main]
    paths:
      - 'contracts/contracts/**'
      - 'contracts/scripts/**'
      - 'contracts/hardhat.config.js'
      - '.github/workflows/solidity-static-analysis.yml'
  schedule:
    # Weekly slow-tier sweep — Mondays 06:00 UTC.
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      run_slow_tier:
        description: 'Run slow tier (Mythril/Halmos/Echidna) in addition to fast tier'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: solidity-static-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:

  # ───────────────────────────────────────────────────────────────
  # Fast tier — Slither
  # ───────────────────────────────────────────────────────────────
  slither:
    name: Slither (SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Install npm deps (for OZ resolve)
        run: npm ci

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        id: slither
        with:
          target: contracts/
          slither-config: contracts/slither.config.json
          fail-on: high
          sarif: slither.sarif
          slither-args: --filter-paths "node_modules|test/|lib/|@openzeppelin"

      - name: Upload SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: contracts/slither.sarif
          category: slither

      - name: Upload Slither artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: slither-report
          path: |
            contracts/slither.sarif
          retention-days: 90

  # ───────────────────────────────────────────────────────────────
  # Fast tier — Aderyn (Cyfrin's Rust-based SAST, complementary to Slither)
  # ───────────────────────────────────────────────────────────────
  aderyn:
    name: Aderyn (SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Install npm deps
        run: npm ci

      - name: Install Aderyn
        run: |
          curl -L https://raw.githubusercontent.com/Cyfrin/aderyn/dev/cyfrinup/install \
            | bash
          # cyfrinup installs to ~/.cyfrin/bin
          echo "$HOME/.cyfrin/bin" >> $GITHUB_PATH

      - name: Verify Aderyn install
        run: aderyn --version

      - name: Run Aderyn
        run: aderyn . --output ../aderyn-report.md
        continue-on-error: true

      - name: Display Aderyn summary
        if: always()
        run: |
          if [ -f ../aderyn-report.md ]; then
            echo "## Aderyn Findings Summary"
            head -200 ../aderyn-report.md
          else
            echo "Aderyn produced no report file"
          fi

      - name: Upload Aderyn artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aderyn-report
          path: aderyn-report.md
          retention-days: 90

  # ───────────────────────────────────────────────────────────────
  # Slow tier — Mythril (symbolic execution)
  # Runs on schedule + workflow_dispatch only. Per-PR run is too slow
  # for the typical merge-window budget.
  # ───────────────────────────────────────────────────────────────
  mythril:
    name: Mythril (symbolic exec)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: |
      github.event_name == 'schedule'
      || (github.event_name == 'workflow_dispatch' && inputs.run_slow_tier == 'true')
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Mythril
        run: pip install mythril

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Install npm deps + compile (Mythril needs flattened bytecode)
        run: |
          npm ci
          npx hardhat compile

      - name: Run Mythril on audit-bundle contracts
        run: |
          mkdir -p ../mythril-reports
          # Targeted set: contracts that hold real fund flow or
          # adjudication logic. Skip mocks, libraries, test harnesses.
          TARGETS=(
            "contracts/EscrowPool.sol"
            "contracts/StakeBond.sol"
            "contracts/BatchSettlementRegistry.sol"
            "contracts/RoyaltyDistributor.sol"
            "contracts/FTNSTokenSimple.sol"
            "contracts/EmissionController.sol"
            "contracts/CompensationDistributor.sol"
            "contracts/StorageSlashing.sol"
            "contracts/KeyDistribution.sol"
          )
          for t in "${TARGETS[@]}"; do
            name=$(basename "$t" .sol)
            echo "=== Mythril: $name ==="
            myth analyze "$t" \
              --solv 0.8.22 \
              --execution-timeout 300 \
              --max-depth 50 \
              -o markdown \
              > "../mythril-reports/${name}.md" 2>&1 \
              || echo "(mythril run for $name finished with non-zero exit)"
          done

      - name: Upload Mythril artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mythril-reports
          path: mythril-reports/
          retention-days: 90

  # ───────────────────────────────────────────────────────────────
  # Slow tier — Halmos (symbolic test runner)
  # No-op until property test contracts exist (test_* / check_* / invariant_* fns).
  # See audits/L1-static-tooling/README.md for the expected interface.
  # ───────────────────────────────────────────────────────────────
  halmos:
    name: Halmos (symbolic verification)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: |
      github.event_name == 'schedule'
      || (github.event_name == 'workflow_dispatch' && inputs.run_slow_tier == 'true')
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Halmos
        run: pip install halmos

      - name: Detect property tests
        id: detect
        run: |
          # Halmos discovers tests by name prefix in foundry-style test/
          # directories. We don't yet ship foundry tests; this is the
          # discovery probe so the job stays green until properties land.
          if find test -name '*.t.sol' 2>/dev/null | grep -q . ; then
            echo "has_props=true" >> $GITHUB_OUTPUT
          else
            echo "has_props=false" >> $GITHUB_OUTPUT
            echo "No foundry-style .t.sol property tests found — Halmos pass is no-op"
            echo "See audits/L1-static-tooling/README.md for adding properties"
          fi

      - name: Run Halmos
        if: steps.detect.outputs.has_props == 'true'
        run: |
          mkdir -p ../halmos-reports
          halmos --json-output ../halmos-reports/halmos.json \
            > ../halmos-reports/halmos.txt 2>&1 || true

      - name: Upload Halmos artifacts
        uses: actions/upload-artifact@v4
        if: always() && steps.detect.outputs.has_props == 'true'
        with:
          name: halmos-reports
          path: halmos-reports/
          retention-days: 90

  # ───────────────────────────────────────────────────────────────
  # Slow tier — Echidna (property-based fuzzer)
  # No-op until echidna-style invariant contracts exist.
  # ───────────────────────────────────────────────────────────────
  echidna:
    name: Echidna (property fuzz)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: |
      github.event_name == 'schedule'
      || (github.event_name == 'workflow_dispatch' && inputs.run_slow_tier == 'true')
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Detect Echidna invariant contracts
        id: detect
        run: |
          # Echidna runs against contracts whose functions return bool
          # and are prefixed `echidna_` or marked `/// @custom:echidna`.
          # We don't yet ship invariant contracts; probe gates the run.
          if find contracts -name 'Echidna*.sol' 2>/dev/null | grep -q . ; then
            echo "has_invariants=true" >> $GITHUB_OUTPUT
          else
            echo "has_invariants=false" >> $GITHUB_OUTPUT
            echo "No Echidna*.sol invariant contracts found — Echidna pass is no-op"
            echo "See audits/L1-static-tooling/README.md for adding invariants"
          fi

      - name: Install Echidna
        if: steps.detect.outputs.has_invariants == 'true'
        run: |
          curl -L https://github.com/crytic/echidna/releases/latest/download/echidna-2.2.5-x86_64-linux.tar.gz \
            | tar -xz -C /usr/local/bin

      - name: Run Echidna
        if: steps.detect.outputs.has_invariants == 'true'
        run: |
          mkdir -p ../echidna-reports
          for f in contracts/Echidna*.sol; do
            name=$(basename "$f" .sol)
            echidna "$f" --contract "$name" --test-limit 50000 \
              > "../echidna-reports/${name}.txt" 2>&1 || true
          done

      - name: Upload Echidna artifacts
        uses: actions/upload-artifact@v4
        if: always() && steps.detect.outputs.has_invariants == 'true'
        with:
          name: echidna-reports
          path: echidna-reports/
          retention-days: 90
