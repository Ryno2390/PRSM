[pytest]
# Pytest configuration for PRSM test suite

# Test discovery patterns
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Directories to ignore during test collection
norecursedirs =
    .git
    .venv
    venv
    env
    agents_venv
    __pycache__
    *.egg-info
    dist
    build
    archive
    */archive/*
    */deprecated/*
    */unused_files/*
    examples_and_demos
    utilities
    sdks
    prsm
    scripts
    docs
    # Pre-v1.6-scope-alignment tests archived under tests/_legacy/. Kept on
    # disk for reference but the underlying modules were deleted in the
    # 2026-04-09 sprint, so imports fail. Excluded from collection.
    _legacy

# Output formatting
addopts = 
    --verbose
    --tb=short
    --strict-markers
    --strict-config
    --disable-warnings
    --color=yes
    
# Test coverage configuration
# Note: Add --cov=prsm to command line to enable coverage for local development
# Example: pytest --cov=prsm --cov-report=term-missing --cov-report=html
# CI/CD automatically adds coverage options

# Test markers for categorization
markers =
    slow: marks tests as slow (may take several seconds)
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    performance: marks tests as performance/benchmark tests
    benchmark: marks tests as performance benchmark tests
    regression: marks tests as regression detection tests
    load: marks tests as load testing and stress tests
    stress: marks tests as stress tests
    network: marks tests that require network simulation
    api: marks tests that test API endpoints
    database: marks tests that interact with database
    security: marks tests related to security and safety
    smoke: marks tests as quick smoke tests
    asyncio: marks tests that use asyncio
    neural: marks tests for neural network functionality
    e2e: marks end-to-end tests that require live P2P infrastructure
         (libp2p Go library + WebSocket ports + local DNS etc.). Run
         locally with `pytest -m e2e`. Deselected in CI by default
         because fixture-level peer-ID / multiaddr setup is not yet
         reliably provisioned for headless CI runners. See
         docs/DEVELOPMENT_GUIDE.md §E2E-tests for the prerequisite
         setup to run them locally.

# Asyncio configuration
asyncio_mode = auto

# Timeout for tests (in seconds)
timeout = 30
timeout_method = thread

# Minimum Python version
minversion = 3.11

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:sqlalchemy.*
    ignore::UserWarning:asyncio.*