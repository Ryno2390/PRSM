# Prometheus Alert Rules for PRSM Bootstrap Server

groups:
  # ===================================
  # Bootstrap Server Alerts
  # ===================================
  - name: bootstrap_server
    rules:
      # High availability alerts
      - alert: BootstrapServerDown
        expr: up{job="prsm-bootstrap"} == 0
        for: 1m
        labels:
          severity: critical
          service: bootstrap
        annotations:
          summary: "Bootstrap server is down"
          description: "Bootstrap server {{ $labels.instance }} has been down for more than 1 minute."

      - alert: BootstrapServerHighLatency
        expr: histogram_quantile(0.95, rate(prsm_bootstrap_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
          service: bootstrap
        annotations:
          summary: "High latency on bootstrap server"
          description: "95th percentile latency is above 1 second on {{ $labels.instance }}."

      # Connection alerts
      - alert: TooManyActiveConnections
        expr: prsm_bootstrap_active_connections > 800
        for: 5m
        labels:
          severity: warning
          service: bootstrap
        annotations:
          summary: "High number of active connections"
          description: "Bootstrap server has {{ $value }} active connections, approaching limit of 1000."

      - alert: ConnectionLimitReached
        expr: prsm_bootstrap_active_connections >= 1000
        for: 1m
        labels:
          severity: critical
          service: bootstrap
        annotations:
          summary: "Connection limit reached"
          description: "Bootstrap server has reached maximum connection limit."

      # Peer management alerts
      - alert: LowPeerCount
        expr: prsm_bootstrap_total_peers < 10
        for: 10m
        labels:
          severity: warning
          service: bootstrap
        annotations:
          summary: "Low peer count in network"
          description: "Only {{ $value }} peers are registered with the bootstrap server."

      - alert: HighPeerChurn
        expr: rate(prsm_bootstrap_peer_disconnections_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          service: bootstrap
        annotations:
          summary: "High peer churn rate"
          description: "Peers are disconnecting at a rate of {{ $value }} per second."

      # Error rate alerts
      - alert: HighErrorRate
        expr: rate(prsm_bootstrap_errors_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          service: bootstrap
        annotations:
          summary: "High error rate on bootstrap server"
          description: "Bootstrap server is experiencing {{ $value }} errors per second."

      - alert: HighFailedConnections
        expr: rate(prsm_bootstrap_failed_connections_total[5m]) > 5
        for: 5m
        labels:
          severity: warning
          service: bootstrap
        annotations:
          summary: "High failed connection rate"
          description: "Bootstrap server is experiencing {{ $value }} failed connections per second."

      # Health check alerts
      - alert: HealthCheckFailures
        expr: prsm_bootstrap_health_check_failures > 3
        for: 1m
        labels:
          severity: critical
          service: bootstrap
        annotations:
          summary: "Bootstrap server health checks failing"
          description: "Bootstrap server has {{ $value }} consecutive health check failures."

  # ===================================
  # System Resource Alerts
  # ===================================
  - name: system_resources
    rules:
      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is above 90% on {{ $labels.instance }}."

      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is above 80% on {{ $labels.instance }}."

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space"
          description: "Less than 10% disk space remaining on {{ $labels.instance }}."

  # ===================================
  # Database Alerts
  # ===================================
  - name: database
    rules:
      - alert: PostgresDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL database is not responding."

      - alert: PostgresTooManyConnections
        expr: pg_stat_activity_count / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "PostgreSQL connection pool nearly exhausted"
          description: "PostgreSQL is using more than 80% of available connections."

      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis is down"
          description: "Redis cache is not responding."

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis memory usage high"
          description: "Redis is using more than 90% of allocated memory."

  # ===================================
  # Network Alerts
  # ===================================
  - name: network
    rules:
      - alert: HighNetworkTraffic
        expr: rate(prsm_bootstrap_bytes_sent_total[5m]) > 100000000
        for: 5m
        labels:
          severity: warning
          service: bootstrap
        annotations:
          summary: "High network traffic"
          description: "Bootstrap server is sending more than 100 MB/s."

      - alert: SSLExpiringSoon
        expr: (ssl_cert_not_after_timestamp_seconds - time()) / 86400 < 30
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "SSL certificate expiring soon"
          description: "SSL certificate will expire in less than 30 days."

      - alert: SSLExpired
        expr: ssl_cert_not_after_timestamp_seconds - time() < 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "SSL certificate has expired"
          description: "SSL certificate has expired. Secure connections will fail."
