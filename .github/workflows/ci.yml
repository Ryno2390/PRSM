name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel any in-progress runs for the same branch / PR when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default to a read-only token — specific jobs opt into more if they need it.
permissions:
  contents: read

jobs:

  # ───────────────────────────────────────────────────────────────
  # Python: tests + coverage on a 3.11 / 3.12 matrix
  # ───────────────────────────────────────────────────────────────
  python-tests:
    name: Python ${{ matrix.python-version }} tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --timeout=120 --cov=prsm --cov-report=xml --cov-report=term -q

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  # ───────────────────────────────────────────────────────────────
  # Lint: ruff + mypy (per-module strict tiers in pyproject.toml)
  # ───────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check prsm/ tests/

      - name: Ruff format (check-only)
        run: ruff format --check prsm/ tests/

      - name: Mypy (per-module strict tiers per pyproject.toml)
        run: mypy prsm/

  # ───────────────────────────────────────────────────────────────
  # Solidity: hardhat tests for smart contracts
  # ───────────────────────────────────────────────────────────────
  solidity-tests:
    name: Solidity tests (hardhat)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run hardhat tests
        run: npx hardhat test

  # ───────────────────────────────────────────────────────────────
  # Security: fast static + dependency scans (advisory, non-blocking today)
  # ───────────────────────────────────────────────────────────────
  security-scan:
    name: Security scan (bandit + pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install scanners
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      - name: Bandit (static application security testing)
        run: bandit -r prsm/ -ll -x tests/,prsm/tests/ || true
        # Non-blocking for now — bandit surfaces advisory findings.
        # Ratchet to fail-on-findings once the baseline is clean.

      - name: pip-audit (dependency CVE scan)
        run: pip-audit -r requirements.txt --skip-editable || true
        # Non-blocking for now — dependency CVE findings need triage,
        # not auto-block. Move to fail-on-HIGH once reviewed.

  # ───────────────────────────────────────────────────────────────
  # Summary gate: single status for branch protection / PR gating
  # ───────────────────────────────────────────────────────────────
  ci-status:
    name: CI status
    runs-on: ubuntu-latest
    needs: [python-tests, lint, solidity-tests, security-scan]
    if: always()
    steps:
      - name: Check upstream job results
        run: |
          set -e
          tests_result="${{ needs.python-tests.result }}"
          lint_result="${{ needs.lint.result }}"
          sol_result="${{ needs.solidity-tests.result }}"
          sec_result="${{ needs.security-scan.result }}"
          echo "python-tests:   $tests_result"
          echo "lint:           $lint_result"
          echo "solidity-tests: $sol_result"
          echo "security-scan:  $sec_result"
          if [[ "$tests_result" != "success" || "$lint_result" != "success" || "$sol_result" != "success" || "$sec_result" != "success" ]]; then
            echo "::error::One or more CI jobs failed; see individual job logs"
            exit 1
          fi
          echo "All CI jobs passed"
